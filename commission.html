<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Commission - aquaticdev</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            aquaticdev
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="commission.html">Commission</a>
        </nav>

    </header>

    <main class="form-container">

        <h1>Commission a Game</h1>

        <p>
            All commissions are currently free!
        </p>

        <form
            action="https://formspree.io/f/xykrpndn"
            method="POST"
        >

            <label for="discord">
                What is your Discord username?
            </label>

            <input
                type="text"
                id="discord"
                name="discord"
                placeholder="example: aquaticdev"
                required
            >

            <label for="buying">
                What are you getting?
            </label>

            <select
                id="buying"
                name="buying"
                required
            >

                <option value="">
                    Select an option
                </option>

                <option value="small-game">
                    Small Game - Free
                </option>

                <option value="medium-game">
                    Medium Game - Free
                </option>

            </select>

            <label for="idea">
                Describe your game idea (VR only)
            </label>

            <textarea
                id="idea"
                name="idea"
                rows="6"
                placeholder="Describe the VR game you want..."
                required
            ></textarea>

            <button type="submit">
                Submit Commission
            </button>

        </form>

    </main>

</body>

</html>
