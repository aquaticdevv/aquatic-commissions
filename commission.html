<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Commission - aquaticdev</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">aquaticdev</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="commission.html">Commission</a>
        </nav>
    </header>

    <main class="form-container">

        <h1>Commission a Game</h1>

        <form action="https://formspree.io/f/xykrpndn" method="POST">

            <label for="discord">
                What is your Discord username?
            </label>

            <input
                type="text"
                id="discord"
                name="discord"
                placeholder="example: aquaticdev"
                required
            >

            <label for="buying">
                What are you buying?
            </label>

            <select id="buying" name="buying" required>
                <option value="">Select an option</option>
                <option value="small-game">$1 - Small Games</option>
                <option value="medium-game">$5 - Medium Games</option>
                <option value="custom-game">$15+ - Custom Games</option>
            </select>

            <label for="payment-method">
                What payment method are you going to use?
            </label>

            <select id="payment-method" name="payment-method" required>
                <option value="">Select an option</option>
                <option value="paypal">PayPal</option>
                <option value="venmo">Venmo</option>
                <option value="cash-app">Cash App</option>
            </select>

            <label for="idea">
                Describe your game idea (VR only)
            </label>

            <textarea
                id="idea"
                name="idea"
                rows="6"
                placeholder="Describe the VR game you want..."
                required
            ></textarea>

            <button type="submit">
                Submit Commission
            </button>

        </form>

    </main>

</body>

</html>
